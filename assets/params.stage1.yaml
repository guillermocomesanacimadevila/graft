# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# nf-core/graft — parameter file
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# User-adjustable parameters for graft.
# This file controls which modules run and defines thresholds/resources used by
# QC, cross-trait genetics, locus definition, fine-mapping, gene mapping,
# QTL integration, SMR/HEIDI, and single-cell QTL analyses.
#
# Override at runtime with:
#   -params-file assets/params.stage1.yaml
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~


# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Workflow toggles
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Set each analysis block to true/false.
# true  = run this workflow/module
# false = skip this workflow/module
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
run_qc: false                   # Run GWAS QC and harmonisation
run_ldsc: false                 # Run LDSC pairwise genetic correlation
run_hdl: false                  # Run HDL global genetic correlation
run_sumher: false               # Run SumHer/LDAK heritability and genetic correlation
run_twosamplemr: false          # Run TwoSampleMR Mendelian randomisation
run_magma: false                # Run MAGMA gene-level analysis
run_lava: false                 # Run LAVA local genetic correlation
run_conjfdr: false              # Run conjunctional FDR cross-trait pleiotropy
run_def_loci: false             # Define loci from significant signals
run_gwas_coloc: false           # Run GWAS-GWAS colocalisation
run_susie: true                 # Run SuSiE fine-mapping / credible-set overlap
run_fuma: true                  # Prepare/export FUMA inputs and post-processing
run_target_genes: false         # Map loci/signals to target genes

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Input / output
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Core user inputs and output location.
# Paths may be relative to the project directory or absolute.
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
input: "assets/gwas.tsv"          # GWAS samplesheet containing trait metadata and summary-statistic paths
pairs: "assets/ldsc_pairs.tsv"    # Trait-pair file defining pairwise analyses
outdir: "results"                 # Root output directory for all pipeline results


# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# GWAS QC / harmonisation
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# SNP-level filters applied during GWAS preprocessing.
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
maf_min: 0.01                     # Minimum minor allele frequency; variants below this are removed
info_min: 0.90                    # Minimum imputation INFO score; applied only when an INFO column exists


# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# LDSC — pairwise genetic correlation
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Filters and sanity thresholds used for LDSC-ready summary statistics and
# LDSC result interpretation.
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
ldsc_maf_filter: 0.01             # MAF filter used for LDSC input; should usually match maf_min
ldsc_info_filter: 0.90            # INFO filter used for LDSC input; should usually match info_min
ldsc_mean_chisq_min: 1.02         # Minimum mean chi-square statistic required for reliable LDSC
ldsc_intercept_min: 0.90          # Lower acceptable LDSC intercept bound
ldsc_intercept_max: 1.10          # Upper acceptable LDSC intercept bound
ldsc_h2_z_min: 2.0                # Minimum heritability Z-score threshold


# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# SumHer / LDAK
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Parameters for LDAK/SumHer heritability and genetic-correlation analyses.
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
power: -0.25                      # LDAK weighting model parameter
thresh: 0.01                      # SNP inclusion threshold for LDAK tagging/model fitting
do_tagging: false                 # Whether to run LDAK tagging; required for full SumHer from raw references


# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# HDL — global genetic correlation
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Parameters controlling HDL decomposition and uncertainty estimation.
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
hdl_eigen_cut: 0.99               # Proportion of eigenvalues retained in HDL decomposition
hdl_N0: 0                         # Sample-overlap parameter; use 0 when assuming no overlap
hdl_lim: 1.522998e-08             # Numerical tolerance for HDL; equivalent to exp(-18)
hdl_jackknife: true               # Whether to compute jackknife standard errors


# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# TwoSampleMR
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Instrument selection, LD clumping, weak-instrument filtering, and pleiotropy
# assessment parameters for Mendelian randomisation.
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
mr_pval_threshold: 5e-8           # P-value threshold for selecting genome-wide significant instruments
f_stat_thresh: 10                 # Minimum F-statistic threshold for instrument strength
mr_clump_r2: 0.001                # LD r² threshold for independent MR instruments
mr_clump_kb: 10000                # LD clumping window size in kilobases
clump_p1: 1                       # Primary PLINK clumping p-value threshold
clump_p2: 1                       # Secondary PLINK clumping p-value threshold
mrpresso_nb_distribution: 1000    # Number of MR-PRESSO simulations
mrpresso_signif_threshold: 0.05   # MR-PRESSO global/outlier significance threshold
phenoscanner_p: 5e-8              # Phenoscanner p-value threshold for pleiotropy checks


# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# LD clumping and locus definition
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Parameters for converting association signals into independent loci.
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
clump_r2: 0.6                     # LD r² threshold for clumping significant variants
clump_kb: 1000                    # Clumping window size in kilobases
merge_kb: 500                     # Distance in kilobases for merging nearby loci
ld_r2: 0.1                        # LD r² threshold used to define locus boundaries
ld_kb: 250                        # LD search window in kilobases
window: 500000                    # Fixed genomic window around lead SNPs in base pairs; 500000 = ±500 kb


# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# SuSiE fine-mapping
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Parameters for credible-set inference and cross-trait credible-set overlap.
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
susie_L: 10                       # Maximum number of causal components; L=1 is conservative with external LD
max_iter: 5000                    # Maximum SuSiE optimisation iterations


# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Gene mapping
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Parameters for mapping loci or prioritised variants to nearby genes.
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
mapping_range: 10                 # Distance in kb added around locus start/end when mapping genes
